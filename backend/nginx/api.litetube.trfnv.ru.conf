# Litetube — API site (machine-to-machine; SmartTube fork talks here)
# Drop into /etc/nginx/sites-available/api.litetube.trfnv.ru.conf
# Symlink: ln -sf /etc/nginx/sites-available/api.litetube.trfnv.ru.conf /etc/nginx/sites-enabled/api.litetube.trfnv.ru.conf

server {
    listen 80;
    listen [::]:80;
    server_name api.litetube.trfnv.ru;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/litetube-acme;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.litetube.trfnv.ru;

    # Bootstrap with Debian snakeoil so nginx -t passes on first deploy even
    # before LE certs exist. setup.sh sed-replaces these to the LE paths once
    # certbot has issued /etc/letsencrypt/live/api.litetube.trfnv.ru/fullchain.pem.
    ssl_certificate /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/api.litetube.trfnv.ru.access.log;
    error_log  /var/log/nginx/api.litetube.trfnv.ru.error.log;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    client_max_body_size 256k;
    # limit_req zone is declared in /etc/nginx/conf.d/litetube-rate-limits.conf (http context).

    location / {
        limit_req zone=api_limit burst=180 nodelay;

        proxy_pass http://127.0.0.1:9090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_connect_timeout 3s;
        proxy_buffering off;
    }
}
