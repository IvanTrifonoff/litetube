# Litetube — default_server catch-alls
#
# Drop into /etc/nginx/conf.d/litetube-default-server.conf on the VPS:
#   ln -sf /srv/proxy-infra/nginx/conf.d/litetube-default-server.conf \
#          /etc/nginx/conf.d/litetube-default-server.conf
#
# Without these, requests with unknown Host headers (Host: random.example)
# could fall through nginx's default behaviour and reach FastAPI on a
# mismatched hostname. Here we make the default behaviour explicit:
#   * port 80   → return 444 (close TCP without a response)
#   * port 443  → accept TLS with Debian's stock snakeoil cert,
#                 then return 444 (no app data leaked)
#
# Implementation note — historical review considered `ssl_reject_handshake on;`
# but that directive requires nginx 1.19.7+ and Debian 12 ships nginx 1.18.
# Using snakeoil + return 444 works on the entire 1.18 → 1.27 range.
#
# Verify ssl-cert is installed on VPS during setup.sh:
#   dpkg -l ssl-cert || apt-get install -y ssl-cert
# That package owns /etc/ssl/certs/ssl-cert-snakeoil.pem and the matching key.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;
    ssl_certificate     /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;
    return 444;
}
