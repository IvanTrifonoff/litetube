# Litetube — HTTP-context rate-limit zones
#
# Drop into /etc/nginx/conf.d/litetube-rate-limits.conf on the VPS:
#   ln -sf /srv/proxy-infra/nginx/conf.d/litetube-rate-limits.conf \
#          /etc/nginx/conf.d/litetube-rate-limits.conf
#
# Debian's stock /etc/nginx/nginx.conf already includes the conf.d/ directory
# from inside the `http {}` block, so zone declarations here are valid in
# http-context (limit_req_zone is http-only, NOT server/location).
#
# Used by:
#   /etc/nginx/sites-enabled/admin.litetube.trfnv.ru.conf  (limit_req zone=admin_limit)
#   /etc/nginx/sites-enabled/api.litetube.trfnv.ru.conf    (limit_req zone=api_limit)

# Operator console — strict rate (manual ops, low real traffic)
limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=20r/m;

# Machine-to-machine API — SmartTube fork refreshes every few minutes
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=120r/m;
