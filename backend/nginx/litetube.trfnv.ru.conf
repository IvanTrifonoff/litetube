# Litetube — apex site (client-facing)
# Drop into /etc/nginx/sites-available/litetube.trfnv.ru.conf
# Symlink: ln -sf /etc/nginx/sites-available/litetube.trfnv.ru.conf /etc/nginx/sites-enabled/litetube.trfnv.ru.conf
# After certbot issues the cert, paths under ssl_certificate* will resolve.

server {
    listen 80;
    listen [::]:80;
    server_name litetube.trfnv.ru;

    # Let's Encrypt ACME challenge — must remain on http.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/litetube-acme;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name litetube.trfnv.ru;

    # Bootstrap with Debian snakeoil so nginx -t passes on first deploy even
    # before LE certs exist. setup.sh sed-replaces these to the LE paths once
    # certbot has issued /etc/letsencrypt/live/litetube.trfnv.ru/fullchain.pem.
    ssl_certificate /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/litetube.trfnv.ru.access.log;
    error_log  /var/log/nginx/litetube.trfnv.ru.error.log;

    client_max_body_size 4m;
    # Body for /api/admin/billing/simulate is tiny; signup form is bounded.

    # Loopback only — fastapi binds 127.0.0.1:9090 in docker-compose.
    location / {
        proxy_pass http://127.0.0.1:9090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 5s;
        proxy_buffering off;
    }

    # Public apex site CSP — minimal, allow inline (vanilla HTML/JS uses it).
    # Allows cross-subdomain connect to api.litetube.trfnv.ru for client UI.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' https://api.litetube.trfnv.ru https://litetube.trfnv.ru; frame-ancestors 'none'; form-action 'self'; base-uri 'self'" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
}

